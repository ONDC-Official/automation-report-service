save-data:
  message_id: "$.context.message_id"
  transaction_id: "$.context.transaction_id"
  timestamp: "$.context.timestamp"
  order_id: "$.message.order.id"
  order_status: "$.message.order.status"
  provider_id: "$.message.order.provider.id"
  provider_name: "$.message.order.provider.descriptor.name"
  items: "$.message.order.items[*]"
  fulfillments: "$.message.order.fulfillments[*]"
  fulfillment_states: "$.message.order.fulfillments[*].state.descriptor.code"
  fulfillment_types: "$.message.order.fulfillments[*].type"
  payments: "$.message.order.payments[*]"
  quote: "$.message.order.quote"
  quote_breakup: "$.message.order.quote.breakup[*]"
  cancellation_terms: "$.message.order.cancellation_terms[*]"
  documents: "$.message.order.documents[*]"
