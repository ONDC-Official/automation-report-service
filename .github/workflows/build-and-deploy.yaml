name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version/tag
        id: vars
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Auto-increment patch version
        run: |
          current_version=$(cat version.txt)
          echo "CURRENT_VERSION=$current_version" >> $GITHUB_ENV
          IFS='.' read -r -a version_parts <<< "$current_version"
          major="${version_parts[0]}"
          minor="${version_parts[1]}"
          patch="${version_parts[2]}"
          patch=$((patch + 1))
          next_version="$major.$minor.$patch"
          echo "Next version: $next_version"
          echo "$next_version" > version.txt
          echo "VERSION=$next_version" >> $GITHUB_ENV
          git add version.txt
          git commit -m "Auto-increment version.txt to $next_version" || echo "No changes to commit"
          git push || echo "No remote to push"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.tag }}

      - name: Clone automation-iac repo
        uses: actions/checkout@v3
        with:
          repository: your-org/automation-iac
          token: ${{ secrets.IAC_REPO_TOKEN }}
          path: automation-iac

      - name: Update image tag in deployment workflow
        run: |
          sed -i "s|ghcr.io/.*/automation-report-service:.*|ghcr.io/${{ github.repository }}:${{ env.tag }}|" automation-iac/.github/workflows/deployment-dev.yaml

      - name: Commit changes and create PR
        run: |
          cd automation-iac
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b update-image-tag-${{ env.tag }}
          git add .github/workflows/deployment-dev.yaml
          git commit -m "Update image tag to ${{ env.tag }}"
          git push origin update-image-tag-${{ env.tag }}
          gh pr create --title "Update image tag to ${{ env.tag }}" --body "Automated update of image tag for automation-report-service" --base main --head update-image-tag-${{ env.tag }}
        env:
          GH_TOKEN: ${{ secrets.IAC_REPO_TOKEN }}
