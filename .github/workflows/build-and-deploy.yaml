name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - test-versioning

permissions:
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set repository name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read semver from package.json and compute image tags
        run: |
          # Read semver from package.json (developers bump via `npm version`)
          SEMVER=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.ref_name }}" = "main" ]; then
            ENVIRONMENT=prod
            IMAGE_TAG="prod-${SEMVER}-${SHORT_SHA}"
            TARGET_FILE="k8/aws/helm/service-layer/values-prod.yaml"
            # include latest only on main
            TAGS="ghcr.io/$REPO_LOWER:${IMAGE_TAG}\nghcr.io/$REPO_LOWER:latest"
          else
            ENVIRONMENT=dev
            IMAGE_TAG="dev-${SEMVER}-${SHORT_SHA}"
            TARGET_FILE="k8/aws/helm/service-layer/values.yaml"
            TAGS="ghcr.io/$REPO_LOWER:${IMAGE_TAG}"
          fi

          echo "SEMVER=$SEMVER" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          # Store tags as newline-separated list for the docker action
          echo -e "REPO_LOWER=$REPO_LOWER\nTAGS=$TAGS\nTARGET_FILE=$TARGET_FILE" >> $GITHUB_ENV

      - name: Set image metadata (OCI labels)
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LOWER }}
          tags: ${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.version=${{ env.SEMVER }}

      - name: Build and push Docker image (with layer cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update image tag in Helm values file
        run: |
          python3 << 'PYEOF'
          import re, os

          target = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']

          with open(target, 'r') as f:
              lines = f.readlines()

          in_report_service = False
          result = []
          for line in lines:
              # Top-level keys have no leading whitespace — use them as section boundaries
              if re.match(r'^[a-zA-Z]', line):
                  in_report_service = line.strip().startswith('reportService:')
              if in_report_service and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)
          PYEOF
        env:
          TARGET_FILE: ${{ env.TARGET_FILE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push tag update to IaC repo
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.TARGET_FILE }}"
          git commit -m "ci: update automation-report-service image tag to ${{ env.IMAGE_TAG }} (${{ env.ENVIRONMENT }})"
          git push