name: Build and Deploy to EKS

on:
  push:
    branches:
      - test-versioning

permissions:
  contents: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set repository name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-increment patch version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          current_version=$(cat version.txt)
          echo "CURRENT_VERSION=$current_version" >> $GITHUB_ENV
          IFS='.' read -r -a version_parts <<< "$current_version"
          major="${version_parts[0]}"
          minor="${version_parts[1]}"
          patch="${version_parts[2]}"
          patch=$((patch + 1))
          next_version="$major.$minor.$patch"
          echo "Next version: $next_version"
          echo "$next_version" > version.txt
          echo "VERSION=$next_version" >> $GITHUB_ENV
          git add version.txt
          git commit -m "ci: auto-increment version to $next_version [skip ci]"
          git push

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:${{ env.VERSION }}
            ghcr.io/${{ env.REPO_LOWER }}:latest

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ secrets.IAC_REPO_TOKEN }}
          path: automation-iac

      - name: Update image tag in deployment workflow
        run: |
          sed -i "s|ghcr.io/.*/automation-report-service:.*|ghcr.io/${{ env.REPO_LOWER }}:${{ env.VERSION }}|" automation-iac/.github/workflows/deployment-dev.yaml

      - name: Commit changes and create PR
        run: |
          cd automation-iac
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b update-image-tag-${{ env.VERSION }}
          git add .github/workflows/deployment-dev.yaml
          git commit -m "ci: update automation-report-service image tag to ${{ env.VERSION }}"
          git push origin update-image-tag-${{ env.VERSION }}
          gh pr create \
            --title "Update automation-report-service image tag to ${{ env.VERSION }}" \
            --body "Automated update of image tag for automation-report-service to version ${{ env.VERSION }}" \
            --base main \
            --head update-image-tag-${{ env.VERSION }}
        env:
          GH_TOKEN: ${{ secrets.IAC_REPO_TOKEN }}