name: Build and Deploy to EKS

on:
  push:
    branches:
      - test-versioning

permissions:
  contents: write
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set repository name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-increment patch version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          current_version=$(cat version.txt)
          echo "CURRENT_VERSION=$current_version" >> $GITHUB_ENV
          IFS='.' read -r -a version_parts <<< "$current_version"
          major="${version_parts[0]}"
          minor="${version_parts[1]}"
          patch="${version_parts[2]}"
          patch=$((patch + 1))
          next_version="$major.$minor.$patch"
          echo "Next version: $next_version"
          echo "$next_version" > version.txt
          echo "VERSION=$next_version" >> $GITHUB_ENV
          git add version.txt
          git commit -m "ci: auto-increment version to $next_version [skip ci]"
          git push

      - name: Determine environment and image tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-$next_version" >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values-preprod.yaml" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=dev-$next_version" >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values.yaml" >> $GITHUB_ENV
          fi
        env:
          next_version: ${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}:latest

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update image tag in Helm values file
        run: |
          python3 << 'PYEOF'
          import re, os

          target = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']

          with open(target, 'r') as f:
              lines = f.readlines()

          in_report_service = False
          result = []
          for line in lines:
              # Top-level keys have no leading whitespace — use them as section boundaries
              if re.match(r'^[a-zA-Z]', line):
                  in_report_service = line.strip().startswith('reportService:')
              if in_report_service and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)
          PYEOF
        env:
          TARGET_FILE: ${{ env.TARGET_FILE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit changes and create PR
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-report-service-tag-${{ env.IMAGE_TAG }}
          git add "${{ env.TARGET_FILE }}"
          git commit -m "ci: update automation-report-service image tag to ${{ env.IMAGE_TAG }} (${{ env.ENVIRONMENT }})"
          git push origin update-report-service-tag-${{ env.IMAGE_TAG }}

          echo "Waiting for branch to be indexed on GitHub..."
          for i in $(seq 1 12); do
            BRANCH_SHA=$(gh api "repos/ONDC-Official/automation-iac/branches/update-report-service-tag-${{ env.IMAGE_TAG }}" \
              --jq '.commit.sha' 2>/dev/null || echo "")
            if [ -n "$BRANCH_SHA" ]; then
              echo "Branch is ready (SHA: $BRANCH_SHA), creating PR..."
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                /repos/ONDC-Official/automation-iac/pulls \
                -f title="[${{ env.ENVIRONMENT }}] Update automation-report-service image tag to ${{ env.IMAGE_TAG }}" \
                -f body="Automated update of image tag for automation-report-service to **${{ env.IMAGE_TAG }}** for **${{ env.ENVIRONMENT }}** environment." \
                -f head="update-report-service-tag-${{ env.IMAGE_TAG }}" \
                -f base="main"
              break
            fi
            echo "Attempt $i/12: branch not yet available, retrying in 5s..."
            sleep 5
          done
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}